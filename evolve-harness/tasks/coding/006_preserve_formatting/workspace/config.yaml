# =============================================================================
# Application Configuration
# =============================================================================
# This file is auto-generated by the deployment pipeline.
# Manual edits are preserved across deploys if comments are intact.
# Last updated: 2026-01-15 by deploy-bot

# -----------------------------------------------------------------------------
# Server Settings
# -----------------------------------------------------------------------------
server:
  # Main server port
  # Must match the load balancer health check target
  port: 8080

  # Bind address — use 0.0.0.0 for container deployments
  host: "0.0.0.0"

  # Request timeouts (in seconds)
  read_timeout: 30      # Max time to read request headers
  write_timeout: 60     # Max time to write response
  idle_timeout: 120     # Keep-alive timeout

  # TLS configuration (optional)
  tls:
    enabled: false
    cert_path: "/etc/ssl/certs/app.pem"     # Certificate file
    key_path: "/etc/ssl/private/app.key"     # Private key file

# -----------------------------------------------------------------------------
# Database settings
# -----------------------------------------------------------------------------
database:
  # Primary database connection
  driver: "postgres"
  host: "db.internal.example.com"
  port: 5432
  name: "appdb"
  user: "app_service"
  # Password is read from DATABASE_PASSWORD env var — never store here

  # Connection pool
  pool:
    max_open: 25        # Maximum open connections
    max_idle: 10        # Maximum idle connections
    max_lifetime: 300   # Connection max lifetime in seconds

  # Slow query threshold (log queries slower than this, in ms)
  slow_query_ms: 200

# -----------------------------------------------------------------------------
# Logging configuration
# -----------------------------------------------------------------------------
logging:
  # Log level: debug, info, warn, error
  level: "info"

  # Output format: json or text
  format: "json"

  # Log file settings
  file:
    enabled: true
    path: "/var/log/app/server.log"
    max_size_mb: 100    # Max size before rotation
    max_backups: 5      # Number of old files to keep
    max_age_days: 30    # Days to keep old files
    compress: true      # Compress rotated files

  # Structured logging fields added to every entry
  default_fields:
    service: "user-api"
    environment: "production"
    version: "2.4.1"

# -----------------------------------------------------------------------------
# Cache settings
# -----------------------------------------------------------------------------
cache:
  # Redis connection
  redis:
    host: "redis.internal.example.com"
    port: 6379
    db: 0
    # Password from REDIS_PASSWORD env var

  # Default TTL for cached items (in seconds)
  default_ttl: 3600

  # Per-entity TTL overrides
  ttl_overrides:
    user_profile: 1800   # 30 minutes — profiles change frequently
    user_settings: 7200  # 2 hours — settings are stable
    feature_flags: 300   # 5 minutes — flags need fast propagation

# -----------------------------------------------------------------------------
# Security settings
# -----------------------------------------------------------------------------
security:
  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_second: 100    # Per-IP limit
    burst: 200                  # Burst allowance

  # CORS configuration
  cors:
    allowed_origins:
      - "https://app.example.com"
      - "https://admin.example.com"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    max_age: 86400              # Preflight cache duration

  # JWT settings
  jwt:
    issuer: "auth.example.com"
    audience: "user-api"
    expiry_minutes: 60          # Token lifetime
    # Signing key from JWT_SECRET env var
