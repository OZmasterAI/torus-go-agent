<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torus Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23f97316'/><circle cx='50' cy='50' r='20' fill='%230f0f0f'/></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg viewBox="0 0 100 100" width="24" height="24">
            <circle cx="50" cy="50" r="45" fill="var(--accent)"/>
            <circle cx="50" cy="50" r="20" fill="var(--bg)"/>
          </svg>
          <span>Torus</span>
        </div>
        <button id="btn-new" title="New Session">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div id="session-list"></div>
      <div class="sidebar-footer">
        <div id="status-info"></div>
        <button id="btn-clear" class="btn-secondary">Clear Context</button>
      </div>
    </aside>

    <main id="main">
      <header id="header-bar">
        <button id="btn-sidebar-toggle" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div id="header-info">Connecting...</div>
      </header>

      <div id="messages">
        <div id="welcome">
          <svg viewBox="0 0 100 100" width="64" height="64">
            <circle cx="50" cy="50" r="45" fill="var(--accent)" opacity="0.15"/>
            <circle cx="50" cy="50" r="30" fill="var(--accent)" opacity="0.25"/>
            <circle cx="50" cy="50" r="15" fill="var(--accent)"/>
          </svg>
          <h2>Torus Agent</h2>
          <p>Your AI coding assistant. Ask anything.</p>
          <div class="welcome-hints">
            <span>Enter to send</span>
            <span>Shift+Enter for newline</span>
            <span>Markdown supported</span>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div class="input-wrapper">
          <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
          <button id="btn-send" title="Send (Enter)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
